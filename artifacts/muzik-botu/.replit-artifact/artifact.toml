kind = "web"
previewPath = "/"
title = "Müzik Botu"
version = "1.0.0"
id = "artifacts/muzik-botu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20387

[services.development]
run = "pnpm --filter @workspace/muzik-botu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/muzik-botu", "run", "build" ]
publicDir = "artifacts/muzik-botu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20387"
BASE_PATH = "/"
